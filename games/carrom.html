<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pool</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* Dark background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Prevents scrolling */
        }
        
        /* The Back Button */
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        /* The Game Board */
        canvas {
            background-color: #f4a460; /* Wood color */
            border: 10px solid #5c4033; /* Dark wood border */
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            touch-action: none; /* Stops the browser from zooming when swiping */
        }

        h1 {
            position: absolute;
            top: 60px;
            font-size: 24px;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <button id="back-btn" onclick="window.location.href='../index.html'">🔙 Home</button>

    <h1>Carrom Pool</h1>
    
    <canvas id="gameCanvas" width="320" height="320"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- GAME VARIABLES ---
        const friction = 0.98; // Slows things down over time
        const boardSize = canvas.width;
        const pocketRadius = 25;
        
        let isDragging = false;
        let dragStartX, dragStartY;

        // --- PIECES SETUP ---
        class Piece {
            constructor(x, y, radius, color, mass) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.mass = mass;
                this.vx = 0; // Speed going left/right
                this.vy = 0; // Speed going up/down
                this.active = true; // Is it still on the board?
            }

            draw() {
                if (!this.active) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.closePath();
            }

            update() {
                if (!this.active) return;
                
                // Move the piece
                this.x += this.vx;
                this.y += this.vy;

                // Apply friction
                this.vx *= friction;
                this.vy *= friction;

                // Stop completely if moving very slowly
                if (Math.abs(this.vx) < 0.1) this.vx = 0;
                if (Math.abs(this.vy) < 0.1) this.vy = 0;

                // Bounce off walls
                if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -1; }
                if (this.x + this.radius > boardSize) { this.x = boardSize - this.radius; this.vx *= -1; }
                if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -1; }
                if (this.y + this.radius > boardSize) { this.y = boardSize - this.radius; this.vy *= -1; }

                // Check if it fell in a hole
                this.checkHoles();
            }

            checkHoles() {
                const holes = [
                    {x: 0, y: 0}, {x: boardSize, y: 0}, 
                    {x: 0, y: boardSize}, {x: boardSize, y: boardSize}
                ];
                
                for (let hole of holes) {
                    let dx = this.x - hole.x;
                    let dy = this.y - hole.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < pocketRadius) {
                        this.active = false; // Hide the piece
                        
                        // If striker falls in, reset it!
                        if (this === striker) {
                            setTimeout(() => {
                                striker.x = boardSize / 2;
                                striker.y = boardSize - 50;
                                striker.vx = 0;
                                striker.vy = 0;
                                striker.active = true;
                            }, 1000);
                        }
                    }
                }
            }
        }

        // Create our pieces
        let pieces = [];
        
        // 1. The Striker (Bigger and heavier)
        const striker = new Piece(boardSize / 2, boardSize - 50, 15, "#ffffff", 2);
        pieces.push(striker);

        // 2. The Queen (Red)
        pieces.push(new Piece(boardSize / 2, boardSize / 2, 12, "#ff3333", 1));
        
        // 3. Some other coins
        pieces.push(new Piece(boardSize / 2 - 25, boardSize / 2, 12, "#222222", 1)); // Black
        pieces.push(new Piece(boardSize / 2 + 25, boardSize / 2, 12, "#eeeeee", 1)); // White
        pieces.push(new Piece(boardSize / 2, boardSize / 2 - 25, 12, "#222222", 1)); // Black
        pieces.push(new Piece(boardSize / 2, boardSize / 2 + 25, 12, "#eeeeee", 1)); // White

        // --- DRAWING THE BOARD ---
        function drawBoard() {
            // Draw 4 corner holes
            ctx.fillStyle = "#222";
            const corners = [
                {x: 0, y: 0}, {x: boardSize, y: 0}, 
                {x: 0, y: boardSize}, {x: boardSize, y: boardSize}
            ];
            corners.forEach(corner => {
                ctx.beginPath();
                ctx.arc(corner.x, corner.y, pocketRadius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw center circle
            ctx.beginPath();
            ctx.arc(boardSize / 2, boardSize / 2, 40, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(0,0,0,0.2)";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // --- PHYSICS: COLLISIONS ---
        function checkCollisions() {
            for (let i = 0; i < pieces.length; i++) {
                for (let j = i + 1; j < pieces.length; j++) {
                    let p1 = pieces[i];
                    let p2 = pieces[j];
                    if (!p1.active || !p2.active) continue;

                    let dx = p2.x - p1.x;
                    let dy = p2.y - p1.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    // If they are touching
                    if (distance < p1.radius + p2.radius) {
                        // Push them apart so they don't get stuck inside each other
                        let overlap = (p1.radius + p2.radius) - distance;
                        let nx = dx / distance;
                        let ny = dy / distance;
                        p1.x -= nx * overlap / 2;
                        p2.x += nx * overlap / 2;

                        // Transfer speed (Simple bouncy physics)
                        let kx = (p1.vx - p2.vx);
                        let ky = (p1.vy - p2.vy);
                        let p = 2 * (nx * kx + ny * ky) / (p1.mass + p2.mass);
                        
                        p1.vx -= p * p2.mass * nx;
                        p1.vy -= p * p2.mass * ny;
                        p2.vx += p * p1.mass * nx;
                        p2.vy += p * p1.mass * ny;
                    }
                }
            }
        }

        // --- MAIN GAME LOOP ---
        function gameLoop() {
            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBoard();

            // Draw Aiming Line
            if (isDragging && striker.active) {
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                // The line goes in the opposite direction of the pull
                let aimX = striker.x + (striker.x - dragStartX);
                let aimY = striker.y + (striker.y - dragStartY);
                ctx.lineTo(aimX, aimY);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]); // Dashed line
                ctx.stroke();
                ctx.setLineDash([]); // Reset dash
            }

            // Update and draw pieces
            pieces.forEach(piece => piece.update());
            checkCollisions();
            pieces.forEach(piece => piece.draw());

            // Ask the browser to run this loop again for the next frame
            requestAnimationFrame(gameLoop);
        }

        // --- CONTROLS ---
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            // Works for both touch and mouse
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        canvas.addEventListener("mousedown", startDrag);
        canvas.addEventListener("touchstart", startDrag, {passive: false});

        canvas.addEventListener("mousemove", drag);
        canvas.addEventListener("touchmove", drag, {passive: false});

        canvas.addEventListener("mouseup", endDrag);
        canvas.addEventListener("touchend", endDrag);

        function startDrag(e) {
            if (!striker.active) return;
            // Only allow dragging if the striker is completely stopped
            if (Math.abs(striker.vx) > 0.1 || Math.abs(striker.vy) > 0.1) return;

            e.preventDefault();
            const pos = getMousePos(e);
            
            // Check if user touched the striker
            let dx = pos.x - striker.x;
            let dy = pos.y - striker.y;
            if (Math.sqrt(dx*dx + dy*dy) <= striker.radius * 2) {
                isDragging = true;
                dragStartX = pos.x;
                dragStartY = pos.y;
            }
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const pos = getMousePos(e);
            dragStartX = pos.x;
            dragStartY = pos.y;
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            // Calculate how far we pulled back
            let pullX = striker.x - dragStartX;
            let pullY = striker.y - dragStartY;
            
            // Apply speed to the striker! (Multiplier makes it shoot faster)
            striker.vx = pullX * 0.15;
            striker.vy = pullY * 0.15;
        }

        // Start the game!
        gameLoop();
    </script>
</body>
</html>
