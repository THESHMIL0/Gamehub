<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pool Pro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; 
        }
        
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 15px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        /* --- NEW: Turn Indicator --- */
        #turn-indicator {
            margin-top: 10px;
            font-size: 22px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 25px;
            background-color: #f2e3c6; /* Starts with Player 1's color */
            color: #111;
            transition: background-color 0.3s, color 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .scoreboard {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .score-white { color: #eeeeee; }
        .score-black { color: #aaaaaa; }

        canvas {
            background-color: #e6b981; 
            border: 15px solid #4a2f1d; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            touch-action: none;
            margin-top: 20px;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 300px;
        }

        .controls label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #ccc;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="back-btn" onclick="window.location.href='../index.html'">🔙 Phone</button>

    <div id="turn-indicator">⚪ Player 1's Turn</div>

    <div class="scoreboard">
        <div class="score-white">⚪ P1: <span id="score-w">0</span></div>
        <div class="score-black">⚫ P2: <span id="score-b">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="340" height="340"></canvas>

    <div class="controls">
        <label>Slide to position Striker</label>
        <input type="range" id="striker-slider" min="60" max="280" value="170">
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const slider = document.getElementById("striker-slider");
        const turnIndicator = document.getElementById("turn-indicator");

        const friction = 0.985; 
        const boardSize = canvas.width;
        const pocketRadius = 22; 
        
        let isDragging = false;
        let dragStartX, dragStartY;
        let scoreWhite = 0;
        let scoreBlack = 0;

        // --- NEW GAME RULE VARIABLES ---
        let currentPlayer = 1; // 1 for White, 2 for Black
        let shotTaken = false; // Tracks if we just hit the striker
        let pocketedThisTurn = false; // Tracks if we scored this turn
        let isStrikerFoul = false; // Tracks if the striker fell in

        class Piece {
            constructor(x, y, radius, color, mass, type) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.mass = mass;
                this.type = type; 
                this.vx = 0; 
                this.vy = 0; 
                this.active = true; 
            }

            draw() {
                if (!this.active) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(0,0,0,0.3)";
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            update() {
                if (!this.active) return;
                
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= friction;
                this.vy *= friction;

                if (Math.abs(this.vx) < 0.05) this.vx = 0;
                if (Math.abs(this.vy) < 0.05) this.vy = 0;

                if (this.x - this.radius < 5) { this.x = this.radius + 5; this.vx *= -1; }
                if (this.x + this.radius > boardSize - 5) { this.x = boardSize - this.radius - 5; this.vx *= -1; }
                if (this.y - this.radius < 5) { this.y = this.radius + 5; this.vy *= -1; }
                if (this.y + this.radius > boardSize - 5) { this.y = boardSize - this.radius - 5; this.vy *= -1; }

                this.checkHoles();
            }

            checkHoles() {
                const holes = [
                    {x: 15, y: 15}, {x: boardSize - 15, y: 15}, 
                    {x: 15, y: boardSize - 15}, {x: boardSize - 15, y: boardSize - 15}
                ];
                
                for (let hole of holes) {
                    let dx = this.x - hole.x;
                    let dy = this.y - hole.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < pocketRadius) {
                        this.active = false; 
                        
                        // --- NEW RULES LOGIC ---
                        if (this.type === "white") {
                            if (currentPlayer === 1) pocketedThisTurn = true; // P1 scored their own coin
                            scoreWhite++;
                            document.getElementById("score-w").innerText = scoreWhite;
                        } else if (this.type === "black") {
                            if (currentPlayer === 2) pocketedThisTurn = true; // P2 scored their own coin
                            scoreBlack++;
                            document.getElementById("score-b").innerText = scoreBlack;
                        } else if (this.type === "striker") {
                            isStrikerFoul = true; // Oh no, penalty!
                            
                            // Deduct 1 point from the player who made the foul
                            if (currentPlayer === 1) {
                                scoreWhite = Math.max(0, scoreWhite - 1); // Can't go below 0
                                document.getElementById("score-w").innerText = scoreWhite;
                            } else {
                                scoreBlack = Math.max(0, scoreBlack - 1);
                                document.getElementById("score-b").innerText = scoreBlack;
                            }
                        }
                    }
                }
            }
        }

        let pieces = [];
        const cx = boardSize / 2;
        const cy = boardSize / 2;
        
        const striker = new Piece(cx, boardSize - 50, 16, "#ffffff", 2.5, "striker");
        pieces.push(striker);

        pieces.push(new Piece(cx, cy, 12, "#ff3333", 1, "queen"));
        
        for (let i = 0; i < 6; i++) {
            let angle = (Math.PI / 3) * i; 
            let px = cx + Math.cos(angle) * 25;
            let py = cy + Math.sin(angle) * 25;
            
            let color = (i % 2 === 0) ? "#f2e3c6" : "#222222";
            let type = (i % 2 === 0) ? "white" : "black";
            pieces.push(new Piece(px, py, 12, color, 1, type));
        }

        function drawBoard() {
            ctx.fillStyle = "#111";
            const holes = [
                {x: 15, y: 15}, {x: boardSize - 15, y: 15}, 
                {x: 15, y: boardSize - 15}, {x: boardSize - 15, y: boardSize - 15}
            ];
            holes.forEach(hole => {
                ctx.beginPath(); ctx.arc(hole.x, hole.y, pocketRadius, 0, Math.PI * 2); ctx.fill();
            });

            ctx.strokeStyle = "#4a2f1d";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, 45, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fillStyle = "#4a2f1d"; ctx.fill();

            ctx.lineWidth = 1.5;
            ctx.strokeRect(50, boardSize - 60, boardSize - 100, 20);
            ctx.beginPath(); ctx.arc(50, boardSize - 50, 10, 0, Math.PI * 2); ctx.fillStyle = "#ff3333"; ctx.fill();
            ctx.beginPath(); ctx.arc(boardSize - 50, boardSize - 50, 10, 0, Math.PI * 2); ctx.fill();
            
            ctx.strokeRect(50, 40, boardSize - 100, 20);
            ctx.beginPath(); ctx.arc(50, 50, 10, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(boardSize - 50, 50, 10, 0, Math.PI * 2); ctx.fill();
        }

        function checkCollisions() {
            for (let i = 0; i < pieces.length; i++) {
                for (let j = i + 1; j < pieces.length; j++) {
                    let p1 = pieces[i];
                    let p2 = pieces[j];
                    if (!p1.active || !p2.active) continue;

                    let dx = p2.x - p1.x;
                    let dy = p2.y - p1.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < p1.radius + p2.radius) {
                        let overlap = (p1.radius + p2.radius) - distance;
                        let nx = dx / distance;
                        let ny = dy / distance;
                        p1.x -= nx * overlap / 2;
                        p2.x += nx * overlap / 2;

                        let kx = (p1.vx - p2.vx);
                        let ky = (p1.vy - p2.vy);
                        let p = 2 * (nx * kx + ny * ky) / (p1.mass + p2.mass);
                        
                        p1.vx -= p * p2.mass * nx;
                        p1.vy -= p * p2.mass * ny;
                        p2.vx += p * p1.mass * nx;
                        p2.vy += p * p1.mass * ny;
                    }
                }
            }
        }

        function isBoardStill() {
            for (let piece of pieces) {
                if (Math.abs(piece.vx) > 0 || Math.abs(piece.vy) > 0) return false;
            }
            return true;
        }

        function resetStriker() {
            striker.x = parseInt(slider.value);
            striker.y = boardSize - 50;
            striker.vx = 0;
            striker.vy = 0;
            striker.active = true;
        }

        function switchTurn() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            
            if (currentPlayer === 1) {
                turnIndicator.innerText = "⚪ Player 1's Turn";
                turnIndicator.style.backgroundColor = "#f2e3c6";
                turnIndicator.style.color = "#111";
            } else {
                turnIndicator.innerText = "⚫ Player 2's Turn";
                turnIndicator.style.backgroundColor = "#222222";
                turnIndicator.style.color = "#fff";
            }
        }

        slider.addEventListener("input", function() {
            if (striker.active && isBoardStill()) {
                striker.x = parseInt(this.value);
                striker.y = boardSize - 50; 
            }
        });

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBoard();

            if (isDragging && striker.active) {
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                
                // Show power based on pull distance
                let pullX = striker.x - dragStartX;
                let pullY = striker.y - dragStartY;
                let aimX = striker.x + pullX * 2;
                let aimY = striker.y + pullY * 2;
                
                ctx.lineTo(aimX, aimY);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 8]); 
                ctx.stroke();
                ctx.setLineDash([]); 
            }

            pieces.forEach(piece => piece.update());
            checkCollisions();
            pieces.forEach(piece => piece.draw());

            // --- NEW: Turn Manager ---
            // When all coins stop moving AFTER a shot was taken
            if (shotTaken && isBoardStill()) {
                
                // If they missed or fouled, change the player's turn
                if (!pocketedThisTurn || isStrikerFoul) {
                    switchTurn();
                }

                // Reset trackers for the next shot
                pocketedThisTurn = false;
                isStrikerFoul = false;
                shotTaken = false; 
                resetStriker();
            }

            requestAnimationFrame(gameLoop);
        }

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener("mousedown", startDrag);
        canvas.addEventListener("touchstart", startDrag, {passive: false});
        canvas.addEventListener("mousemove", drag);
        canvas.addEventListener("touchmove", drag, {passive: false});
        canvas.addEventListener("mouseup", endDrag);
        canvas.addEventListener("touchend", endDrag);

        function startDrag(e) {
            if (!striker.active || !isBoardStill()) return;
            e.preventDefault();
            const pos = getMousePos(e);
            
            let dx = pos.x - striker.x;
            let dy = pos.y - striker.y;
            if (Math.sqrt(dx*dx + dy*dy) <= striker.radius * 2) {
                isDragging = true;
                dragStartX = pos.x;
                dragStartY = pos.y;
            }
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const pos = getMousePos(e);
            dragStartX = pos.x;
            dragStartY = pos.y;
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            let pullX = striker.x - dragStartX;
            let pullY = striker.y - dragStartY;
            
            let power = Math.min(Math.sqrt(pullX*pullX + pullY*pullY), 100);
            let angle = Math.atan2(pullY, pullX);

            striker.vx = Math.cos(angle) * power * 0.2;
            striker.vy = Math.sin(angle) * power * 0.2;
            
            // Tell the game loop a shot was fired!
            shotTaken = true;
        }

        gameLoop();
    </script>
</body>
</html>
