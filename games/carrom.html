<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pool Pro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; 
        }
        
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 15px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        /* The Scoreboard */
        .scoreboard {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .score-white { color: #eeeeee; }
        .score-black { color: #aaaaaa; }

        canvas {
            background-color: #e6b981; /* Lighter wood color */
            border: 15px solid #4a2f1d; /* Dark thick wood border */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            touch-action: none;
            margin-top: 30px;
        }

        /* The Striker Slider Controls */
        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 300px;
        }

        .controls label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #ccc;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="back-btn" onclick="window.location.href='../index.html'">🔙 Phone</button>

    <div class="scoreboard">
        <div class="score-white">⚪ White: <span id="score-w">0</span></div>
        <div class="score-black">⚫ Black: <span id="score-b">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="340" height="340"></canvas>

    <div class="controls">
        <label>Slide to position Striker</label>
        <input type="range" id="striker-slider" min="60" max="280" value="170">
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const slider = document.getElementById("striker-slider");

        // Game Variables
        const friction = 0.985; // Slightly smoother sliding
        const boardSize = canvas.width;
        const pocketRadius = 22; // Slightly smaller, more realistic pockets
        
        let isDragging = false;
        let dragStartX, dragStartY;
        let scoreWhite = 0;
        let scoreBlack = 0;

        // Piece Class
        class Piece {
            constructor(x, y, radius, color, mass, type) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.mass = mass;
                this.type = type; // "striker", "queen", "white", "black"
                this.vx = 0; 
                this.vy = 0; 
                this.active = true; 
            }

            draw() {
                if (!this.active) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // Add a cool inner ring to the coins for detail
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(0,0,0,0.3)";
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            update() {
                if (!this.active) return;
                
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= friction;
                this.vy *= friction;

                if (Math.abs(this.vx) < 0.05) this.vx = 0;
                if (Math.abs(this.vy) < 0.05) this.vy = 0;

                // Bounce off walls (taking border into account)
                if (this.x - this.radius < 5) { this.x = this.radius + 5; this.vx *= -1; }
                if (this.x + this.radius > boardSize - 5) { this.x = boardSize - this.radius - 5; this.vx *= -1; }
                if (this.y - this.radius < 5) { this.y = this.radius + 5; this.vy *= -1; }
                if (this.y + this.radius > boardSize - 5) { this.y = boardSize - this.radius - 5; this.vy *= -1; }

                this.checkHoles();
            }

            checkHoles() {
                // Pockets are slightly inside the corners now
                const holes = [
                    {x: 15, y: 15}, {x: boardSize - 15, y: 15}, 
                    {x: 15, y: boardSize - 15}, {x: boardSize - 15, y: boardSize - 15}
                ];
                
                for (let hole of holes) {
                    let dx = this.x - hole.x;
                    let dy = this.y - hole.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < pocketRadius) {
                        this.active = false; 
                        
                        // Update Scoreboard
                        if (this.type === "white") {
                            scoreWhite++;
                            document.getElementById("score-w").innerText = scoreWhite;
                        } else if (this.type === "black") {
                            scoreBlack++;
                            document.getElementById("score-b").innerText = scoreBlack;
                        }

                        // Reset Striker
                        if (this.type === "striker") {
                            setTimeout(resetStriker, 500);
                        }
                    }
                }
            }
        }

        // Setup the Board
        let pieces = [];
        const cx = boardSize / 2;
        const cy = boardSize / 2;
        
        // 1. The Striker
        const striker = new Piece(cx, boardSize - 50, 16, "#ffffff", 2.5, "striker");
        pieces.push(striker);

        // 2. The Queen (Center)
        pieces.push(new Piece(cx, cy, 12, "#ff3333", 1, "queen"));
        
        // 3. Arrange 6 coins in a circle around the queen
        const coinRadius = 12;
        const ringDistance = 25; // Distance from center
        for (let i = 0; i < 6; i++) {
            let angle = (Math.PI / 3) * i; // Divides a circle into 6 pieces
            let px = cx + Math.cos(angle) * ringDistance;
            let py = cy + Math.sin(angle) * ringDistance;
            
            // Alternate colors (even = white, odd = black)
            let color = (i % 2 === 0) ? "#f2e3c6" : "#222222";
            let type = (i % 2 === 0) ? "white" : "black";
            pieces.push(new Piece(px, py, coinRadius, color, 1, type));
        }

        // --- DRAWING REALISTIC BOARD MARKINGS ---
        function drawBoard() {
            // Draw 4 corner holes
            ctx.fillStyle = "#111";
            const holes = [
                {x: 15, y: 15}, {x: boardSize - 15, y: 15}, 
                {x: 15, y: boardSize - 15}, {x: boardSize - 15, y: boardSize - 15}
            ];
            holes.forEach(hole => {
                ctx.beginPath();
                ctx.arc(hole.x, hole.y, pocketRadius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Center Rings
            ctx.strokeStyle = "#4a2f1d";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, 45, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fillStyle = "#4a2f1d"; ctx.fill();

            // Striker Baselines (Top and Bottom)
            ctx.lineWidth = 1.5;
            // Bottom line (where we shoot from)
            ctx.strokeRect(50, boardSize - 60, boardSize - 100, 20);
            ctx.beginPath(); ctx.arc(50, boardSize - 50, 10, 0, Math.PI * 2); ctx.fillStyle = "#ff3333"; ctx.fill();
            ctx.beginPath(); ctx.arc(boardSize - 50, boardSize - 50, 10, 0, Math.PI * 2); ctx.fill();
            
            // Top line (just for visuals)
            ctx.strokeRect(50, 40, boardSize - 100, 20);
            ctx.beginPath(); ctx.arc(50, 50, 10, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(boardSize - 50, 50, 10, 0, Math.PI * 2); ctx.fill();
        }

        // --- PHYSICS: COLLISIONS ---
        function checkCollisions() {
            for (let i = 0; i < pieces.length; i++) {
                for (let j = i + 1; j < pieces.length; j++) {
                    let p1 = pieces[i];
                    let p2 = pieces[j];
                    if (!p1.active || !p2.active) continue;

                    let dx = p2.x - p1.x;
                    let dy = p2.y - p1.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < p1.radius + p2.radius) {
                        let overlap = (p1.radius + p2.radius) - distance;
                        let nx = dx / distance;
                        let ny = dy / distance;
                        p1.x -= nx * overlap / 2;
                        p2.x += nx * overlap / 2;

                        let kx = (p1.vx - p2.vx);
                        let ky = (p1.vy - p2.vy);
                        let p = 2 * (nx * kx + ny * ky) / (p1.mass + p2.mass);
                        
                        p1.vx -= p * p2.mass * nx;
                        p1.vy -= p * p2.mass * ny;
                        p2.vx += p * p1.mass * nx;
                        p2.vy += p * p1.mass * ny;
                    }
                }
            }
        }

        // Check if all pieces have stopped moving
        function isBoardStill() {
            for (let piece of pieces) {
                if (Math.abs(piece.vx) > 0 || Math.abs(piece.vy) > 0) return false;
            }
            return true;
        }

        function resetStriker() {
            striker.x = parseInt(slider.value);
            striker.y = boardSize - 50;
            striker.vx = 0;
            striker.vy = 0;
            striker.active = true;
        }

        // --- SLIDER LOGIC ---
        slider.addEventListener("input", function() {
            // Only move the striker if it's currently our turn and everything is stopped
            if (striker.active && isBoardStill()) {
                striker.x = parseInt(this.value);
                striker.y = boardSize - 50; // Lock it to the baseline
            }
        });

        // --- MAIN GAME LOOP ---
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBoard();

            // Draw Aiming Line
            if (isDragging && striker.active) {
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                let aimX = striker.x + (striker.x - dragStartX) * 2;
                let aimY = striker.y + (striker.y - dragStartY) * 2;
                ctx.lineTo(aimX, aimY);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 8]); 
                ctx.stroke();
                ctx.setLineDash([]); 
            }

            pieces.forEach(piece => piece.update());
            checkCollisions();
            pieces.forEach(piece => piece.draw());

            // Check if we need to reset the striker for the next turn
            if (striker.active && isBoardStill() && striker.y !== boardSize - 50 && !isDragging) {
                resetStriker();
            }

            requestAnimationFrame(gameLoop);
        }

        // --- CONTROLS ---
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener("mousedown", startDrag);
        canvas.addEventListener("touchstart", startDrag, {passive: false});
        canvas.addEventListener("mousemove", drag);
        canvas.addEventListener("touchmove", drag, {passive: false});
        canvas.addEventListener("mouseup", endDrag);
        canvas.addEventListener("touchend", endDrag);

        function startDrag(e) {
            if (!striker.active || !isBoardStill()) return;
            e.preventDefault();
            const pos = getMousePos(e);
            
            let dx = pos.x - striker.x;
            let dy = pos.y - striker.y;
            if (Math.sqrt(dx*dx + dy*dy) <= striker.radius * 2) {
                isDragging = true;
                dragStartX = pos.x;
                dragStartY = pos.y;
            }
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const pos = getMousePos(e);
            dragStartX = pos.x;
            dragStartY = pos.y;
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            let pullX = striker.x - dragStartX;
            let pullY = striker.y - dragStartY;
            
            // Limits the max power so the striker doesn't break the physics
            let power = Math.min(Math.sqrt(pullX*pullX + pullY*pullY), 100);
            let angle = Math.atan2(pullY, pullX);

            striker.vx = Math.cos(angle) * power * 0.2;
            striker.vy = Math.sin(angle) * power * 0.2;
        }

        gameLoop();
    </script>
</body>
</html>
