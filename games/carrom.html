<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pool Ultra Pro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; 
        }
        
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 15px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        #turn-indicator {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 25px;
            background-color: #f2e3c6; 
            color: #111;
            transition: background-color 0.3s, color 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .scoreboard {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .score-white { color: #eeeeee; }
        .score-black { color: #aaaaaa; }

        .game-container {
            position: relative;
            margin-top: 15px;
        }

        canvas {
            background-color: #e6b981; 
            border: 15px solid #4a2f1d; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            touch-action: none;
        }

        /* --- NEW: Game Over Screen --- */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            backdrop-filter: blur(4px);
        }

        #game-over h2 {
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        #game-over button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            border: none;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }

        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 300px;
        }

        .controls label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #ccc;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="back-btn" onclick="window.location.href='../index.html'">🔙 Phone</button>

    <div id="turn-indicator">⚪ Player 1's Turn</div>

    <div class="scoreboard">
        <div class="score-white">⚪ P1: <span id="score-w">0</span>/9</div>
        <div class="score-black">⚫ P2: <span id="score-b">0</span>/9</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="340" height="340"></canvas>
        
        <div id="game-over" class="hidden">
            <h2 id="winner-text">Player 1 Wins! 🎉</h2>
            <button onclick="location.reload()">🔄 Play Again</button>
        </div>
    </div>

    <div class="controls">
        <label>Slide to position Striker</label>
        <input type="range" id="striker-slider" min="60" max="280" value="170">
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const slider = document.getElementById("striker-slider");
        const turnIndicator = document.getElementById("turn-indicator");
        const gameOverScreen = document.getElementById("game-over");
        const winnerText = document.getElementById("winner-text");

        // --- NEW: Audio Setup ---
        // This generates sounds without needing MP3 files!
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'hit') {
                // Short "clack" sound for collisions
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'pocket') {
                // Deeper "thwump" sound for falling in a hole
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            }
        }

        const friction = 0.985; 
        const boardSize = canvas.width;
        const pocketRadius = 22; 
        const maxScore = 9; // Real carrom has 9 of each color
        
        let isDragging = false;
        let dragStartX, dragStartY;
        let scoreWhite = 0;
        let scoreBlack = 0;
        let gameIsOver = false;

        let currentPlayer = 1; 
        let shotTaken = false; 
        let pocketedThisTurn = false; 
        let isStrikerFoul = false; 

        class Piece {
            constructor(x, y, radius, color, mass, type) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.mass = mass;
                this.type = type; 
                this.vx = 0; 
                this.vy = 0; 
                this.active = true; 
            }

            draw() {
                if (!this.active) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(0,0,0,0.4)";
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            update() {
                if (!this.active) return;
                
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= friction;
                this.vy *= friction;

                if (Math.abs(this.vx) < 0.05) this.vx = 0;
                if (Math.abs(this.vy) < 0.05) this.vy = 0;

                // Bounce off walls
                let bounced = false;
                if (this.x - this.radius < 5) { this.x = this.radius + 5; this.vx *= -1; bounced = true; }
                if (this.x + this.radius > boardSize - 5) { this.x = boardSize - this.radius - 5; this.vx *= -1; bounced = true; }
                if (this.y - this.radius < 5) { this.y = this.radius + 5; this.vy *= -1; bounced = true; }
                if (this.y + this.radius > boardSize - 5) { this.y = boardSize - this.radius - 5; this.vy *= -1; bounced = true; }
                
                // Play a tiny sound if hitting a wall fast
                if (bounced && (Math.abs(this.vx) > 2 || Math.abs(this.vy) > 2)) playSound('hit');

                this.checkHoles();
            }

            checkHoles() {
                const holes = [
                    {x: 15, y: 15}, {x: boardSize - 15, y: 15}, 
                    {x: 15, y: boardSize - 15}, {x: boardSize - 15, y: boardSize - 15}
                ];
                
                for (let hole of holes) {
                    let dx = this.x - hole.x;
                    let dy = this.y - hole.y;
                    if (Math.sqrt(dx * dx + dy * dy) < pocketRadius) {
                        this.active = false; 
                        playSound('pocket'); // PLOP sound!
                        
                        if (this.type === "white") {
                            if (currentPlayer === 1) pocketedThisTurn = true; 
                            scoreWhite++;
                            document.getElementById("score-w").innerText = scoreWhite;
                            checkWin();
                        } else if (this.type === "black") {
                            if (currentPlayer === 2) pocketedThisTurn = true; 
                            scoreBlack++;
                            document.getElementById("score-b").innerText = scoreBlack;
                            checkWin();
                        } else if (this.type === "striker") {
                            isStrikerFoul = true; 
                            if (currentPlayer === 1) {
                                scoreWhite = Math.max(0, scoreWhite - 1); 
                                document.getElementById("score-w").innerText = scoreWhite;
                            } else {
                                scoreBlack = Math.max(0, scoreBlack - 1);
                                document.getElementById("score-b").innerText = scoreBlack;
                            }
                        }
                    }
                }
            }
        }

        let pieces = [];
        const cx = boardSize / 2;
        const cy = boardSize / 2;
        const coinRadius = 11; // Slightly smaller to fit 19 coins
        
        // 1. The Striker
        const striker = new Piece(cx, boardSize - 50, 15, "#ffffff", 2.5, "striker");
        pieces.push(striker);

        // 2. The Queen
        pieces.push(new Piece(cx, cy, coinRadius, "#ff3333", 1, "queen"));
        
        // 3. Inner Ring (6 coins)
        for (let i = 0; i < 6; i++) {
            let angle = (Math.PI / 3) * i; 
            let px = cx + Math.cos(angle) * 24;
            let py = cy + Math.sin(angle) * 24;
            let color = (i % 2 === 0) ? "#f2e3c6" : "#222222";
            let type = (i % 2 === 0) ? "white" : "black";
            pieces.push(new Piece(px, py, coinRadius, color, 1, type));
        }

        // 4. Outer Ring (12 coins)
        for (let i = 0; i < 12; i++) {
            let angle = (Math.PI / 6) * i; 
            let px = cx + Math.cos(angle) * 48;
            let py = cy + Math.sin(angle) * 48;
            let color = (i % 2 === 0) ? "#222222" : "#f2e3c6"; // Alternating opposite to inner ring
            let type = (i % 2 === 0) ? "black" : "white";
            pieces.push(new Piece(px, py, coinRadius, color, 1, type));
        }

        function drawBoard() {
            ctx.fillStyle = "#111";
            const holes = [
                {x: 15, y: 15}, {x: boardSize - 15, y: 15}, 
                {x: 15, y: boardSize - 15}, {x: boardSize - 15, y: boardSize - 15}
            ];
            holes.forEach(hole => {
                ctx.beginPath(); ctx.arc(hole.x, hole.y, pocketRadius, 0, Math.PI * 2); ctx.fill();
            });

            ctx.strokeStyle = "#4a2f1d";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, 65, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fillStyle = "#4a2f1d"; ctx.fill();

            ctx.lineWidth = 1.5;
            ctx.strokeRect(50, boardSize - 60, boardSize - 100, 20);
            ctx.beginPath(); ctx.arc(50, boardSize - 50, 10, 0, Math.PI * 2); ctx.fillStyle = "#ff3333"; ctx.fill();
            ctx.beginPath(); ctx.arc(boardSize - 50, boardSize - 50, 10, 0, Math.PI * 2); ctx.fill();
            
            ctx.strokeRect(50, 40, boardSize - 100, 20);
            ctx.beginPath(); ctx.arc(50, 50, 10, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(boardSize - 50, 50, 10, 0, Math.PI * 2); ctx.fill();
        }

        function checkCollisions() {
            for (let i = 0; i < pieces.length; i++) {
                for (let j = i + 1; j < pieces.length; j++) {
                    let p1 = pieces[i];
                    let p2 = pieces[j];
                    if (!p1.active || !p2.active) continue;

                    let dx = p2.x - p1.x;
                    let dy = p2.y - p1.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < p1.radius + p2.radius) {
                        // Play hitting sound if they collide with some speed
                        if (Math.abs(p1.vx - p2.vx) > 0.5 || Math.abs(p1.vy - p2.vy) > 0.5) {
                            playSound('hit');
                        }

                        let overlap = (p1.radius + p2.radius) - distance;
                        let nx = dx / distance;
                        let ny = dy / distance;
                        p1.x -= nx * overlap / 2;
                        p2.x += nx * overlap / 2;

                        let kx = (p1.vx - p2.vx);
                        let ky = (p1.vy - p2.vy);
                        let p = 2 * (nx * kx + ny * ky) / (p1.mass + p2.mass);
                        
                        p1.vx -= p * p2.mass * nx;
                        p1.vy -= p * p2.mass * ny;
                        p2.vx += p * p1.mass * nx;
                        p2.vy += p * p1.mass * ny;
                    }
                }
            }
        }

        function isBoardStill() {
            for (let piece of pieces) {
                if (Math.abs(piece.vx) > 0 || Math.abs(piece.vy) > 0) return false;
            }
            return true;
        }

        function resetStriker() {
            striker.x = parseInt(slider.value);
            striker.y = boardSize - 50;
            striker.vx = 0;
            striker.vy = 0;
            striker.active = true;
        }

        function switchTurn() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            
            if (currentPlayer === 1) {
                turnIndicator.innerText = "⚪ Player 1's Turn";
                turnIndicator.style.backgroundColor = "#f2e3c6";
                turnIndicator.style.color = "#111";
            } else {
                turnIndicator.innerText = "⚫ Player 2's Turn";
                turnIndicator.style.backgroundColor = "#222222";
                turnIndicator.style.color = "#fff";
            }
        }

        // --- NEW: Check for Winner ---
        function checkWin() {
            if (scoreWhite >= maxScore) {
                winnerText.innerText = "⚪ Player 1 Wins! 🎉";
                gameOverScreen.classList.remove("hidden");
                gameIsOver = true;
            } else if (scoreBlack >= maxScore) {
                winnerText.innerText = "⚫ Player 2 Wins! 🎉";
                gameOverScreen.classList.remove("hidden");
                gameIsOver = true;
            }
        }

        slider.addEventListener("input", function() {
            if (striker.active && isBoardStill() && !gameIsOver) {
                striker.x = parseInt(this.value);
                striker.y = boardSize - 50; 
            }
        });

        function gameLoop() {
            if (gameIsOver) return; // Stop the loop if someone won

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBoard();

            if (isDragging && striker.active) {
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                let aimX = striker.x + (striker.x - dragStartX) * 2;
                let aimY = striker.y + (striker.y - dragStartY) * 2;
                ctx.lineTo(aimX, aimY);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 8]); 
                ctx.stroke();
                ctx.setLineDash([]); 
            }

            pieces.forEach(piece => piece.update());
            checkCollisions();
            pieces.forEach(piece => piece.draw());

            if (shotTaken && isBoardStill()) {
                if (!pocketedThisTurn || isStrikerFoul) switchTurn();
                pocketedThisTurn = false;
                isStrikerFoul = false;
                shotTaken = false; 
                resetStriker();
            }

            requestAnimationFrame(gameLoop);
        }

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener("mousedown", startDrag);
        canvas.addEventListener("touchstart", startDrag, {passive: false});
        canvas.addEventListener("mousemove", drag);
        canvas.addEventListener("touchmove", drag, {passive: false});
        canvas.addEventListener("mouseup", endDrag);
        canvas.addEventListener("touchend", endDrag);

        function startDrag(e) {
            if (!striker.active || !isBoardStill() || gameIsOver) return;
            e.preventDefault();
            
            // Unlocks audio context on first touch (browser requirement for sound)
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const pos = getMousePos(e);
            let dx = pos.x - striker.x;
            let dy = pos.y - striker.y;
            if (Math.sqrt(dx*dx + dy*dy) <= striker.radius * 2) {
                isDragging = true;
                dragStartX = pos.x;
                dragStartY = pos.y;
            }
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const pos = getMousePos(e);
            dragStartX = pos.x;
            dragStartY = pos.y;
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            let pullX = striker.x - dragStartX;
            let pullY = striker.y - dragStartY;
            let power = Math.min(Math.sqrt(pullX*pullX + pullY*pullY), 100);
            let angle = Math.atan2(pullY, pullX);

            striker.vx = Math.cos(angle) * power * 0.2;
            striker.vy = Math.sin(angle) * power * 0.2;
            shotTaken = true;
        }

        gameLoop();
    </script>
</body>
</html>
