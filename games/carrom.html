<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pool Ultra Pro</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        #back-btn { position: absolute; top: 20px; left: 20px; padding: 8px 15px; background-color: rgba(255, 255, 255, 0.2); color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); z-index: 10; }
        #turn-indicator { margin-top: 10px; font-size: 18px; font-weight: bold; padding: 10px 25px; border-radius: 25px; background-color: #f2e3c6; color: #111; transition: background-color 0.3s, color 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .scoreboard { margin-top: 10px; display: flex; gap: 20px; font-size: 16px; font-weight: bold; background-color: rgba(0, 0, 0, 0.5); padding: 10px 20px; border-radius: 20px; }
        .score-white { color: #eeeeee; }
        .score-black { color: #aaaaaa; }
        .game-container { position: relative; margin-top: 15px; }
        canvas { background-color: #e6b981; border: 15px solid #4a2f1d; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); touch-action: none; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; backdrop-filter: blur(4px); }
        #game-over h2 { font-size: 32px; margin-bottom: 20px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #game-over button { padding: 12px 25px; font-size: 18px; font-weight: bold; border-radius: 25px; border: none; background-color: #4caf50; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .controls { margin-top: 15px; display: flex; flex-direction: column; align-items: center; width: 300px; }
        .controls label { font-size: 14px; margin-bottom: 5px; color: #ccc; }
        input[type=range] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <button id="back-btn" onclick="window.location.href='../index.html'">🔙 Phone</button>
    <div id="turn-indicator">⚪ Player 1 (Bottom)</div>
    <div class="scoreboard">
        <div class="score-white">⚪ P1: <span id="score-w">0</span>/9</div>
        <div class="score-black">⚫ P2: <span id="score-b">0</span>/9</div>
    </div>
    <div class="game-container">
        <canvas id="gameCanvas" width="340" height="340"></canvas>
        <div id="game-over" class="hidden">
            <h2 id="winner-text">Player 1 Wins! 🎉</h2>
            <button onclick="location.reload()">🔄 Play Again</button>
        </div>
    </div>
    <div class="controls">
        <label>Slide to position Striker</label>
        <input type="range" id="striker-slider" min="60" max="280" value="170">
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const slider = document.getElementById("striker-slider");
        const turnIndicator = document.getElementById("turn-indicator");
        const gameOverScreen = document.getElementById("game-over");
        const winnerText = document.getElementById("winner-text");

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'hit') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'pocket') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            }
        }

        const friction = 0.985, restitution = 0.85, boardSize = canvas.width, pocketRadius = 22, maxScore = 9; 
        let isDragging = false, dragStartX, dragStartY, scoreWhite = 0, scoreBlack = 0, gameIsOver = false;
        let currentPlayer = 1, shotTaken = false, pocketedThisTurn = false, isStrikerFoul = false; 

        class Piece {
            constructor(x, y, radius, color, mass, type) {
                this.x = x; this.y = y; this.radius = radius; this.color = color;
                this.mass = mass; this.type = type; this.vx = 0; this.vy = 0; this.active = true; 
            }
            draw() {
                if (!this.active) return;
                ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
                ctx.shadowColor = "transparent";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 1; ctx.stroke();
            }
            update() {
                if (!this.active) return;
                this.x += this.vx; this.y += this.vy; this.vx *= friction; this.vy *= friction;
                if (Math.abs(this.vx) < 0.08) this.vx = 0; if (Math.abs(this.vy) < 0.08) this.vy = 0;

                let bounced = false;
                if (this.x - this.radius < 5) { this.x = this.radius + 5; this.vx *= -1; bounced = true; }
                if (this.x + this.radius > boardSize - 5) { this.x = boardSize - this.radius - 5; this.vx *= -1; bounced = true; }
                if (this.y - this.radius < 5) { this.y = this.radius + 5; this.vy *= -1; bounced = true; }
                if (this.y + this.radius > boardSize - 5) { this.y = boardSize - this.radius - 5; this.vy *= -1; bounced = true; }
                if (bounced && (Math.abs(this.vx) > 2 || Math.abs(this.vy) > 2)) playSound('hit');
                this.checkHoles();
            }
            checkHoles() {
                const holes = [{x: 15, y: 15}, {x: boardSize - 15, y: 15}, {x: 15, y: boardSize - 15}, {x: boardSize - 15, y: boardSize - 15}];
                for (let hole of holes) {
                    if (Math.sqrt((this.x - hole.x)**2 + (this.y - hole.y)**2) < pocketRadius) {
                        this.active = false; this.vx = 0; this.vy = 0; playSound('pocket'); 
                        if (this.type === "white") {
                            if (currentPlayer === 1) pocketedThisTurn = true; 
                            scoreWhite++; document.getElementById("score-w").innerText = scoreWhite; checkWin();
                        } else if (this.type === "black") {
                            if (currentPlayer === 2) pocketedThisTurn = true; 
                            scoreBlack++; document.getElementById("score-b").innerText = scoreBlack; checkWin();
                        } else if (this.type === "striker") {
                            isStrikerFoul = true; 
                            if (currentPlayer === 1) { scoreWhite = Math.max(0, scoreWhite - 1); document.getElementById("score-w").innerText = scoreWhite; } 
                            else { scoreBlack = Math.max(0, scoreBlack - 1); document.getElementById("score-b").innerText = scoreBlack; }
                        }
                    }
                }
            }
        }
        let pieces = [];
        const cx = boardSize / 2, cy = boardSize / 2, coinRadius = 11; 
        const striker = new Piece(cx, boardSize - 50, 15, "#ffffff", 2.5, "striker");
        pieces.push(striker);
        pieces.push(new Piece(cx, cy, coinRadius, "#ff3333", 1, "queen"));
        
        for (let i = 0; i < 6; i++) {
            let angle = (Math.PI / 3) * i; 
            pieces.push(new Piece(cx + Math.cos(angle) * 24, cy + Math.sin(angle) * 24, coinRadius, (i % 2 === 0) ? "#f2e3c6" : "#222222", 1, (i % 2 === 0) ? "white" : "black"));
        }
        for (let i = 0; i < 12; i++) {
            let angle = (Math.PI / 6) * i; 
            pieces.push(new Piece(cx + Math.cos(angle) * 48, cy + Math.sin(angle) * 48, coinRadius, (i % 2 === 0) ? "#222222" : "#f2e3c6", 1, (i % 2 === 0) ? "black" : "white"));
        }

        function drawBoard() {
            ctx.shadowColor = "transparent"; ctx.fillStyle = "#111";
            [{x: 15, y: 15}, {x: boardSize - 15, y: 15}, {x: 15, y: boardSize - 15}, {x: boardSize - 15, y: boardSize - 15}].forEach(h => {
                ctx.beginPath(); ctx.arc(h.x, h.y, pocketRadius, 0, Math.PI * 2); ctx.fill();
            });
            ctx.strokeStyle = "#4a2f1d"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, 65, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fillStyle = "#4a2f1d"; ctx.fill();
            ctx.lineWidth = 1.5;
            ctx.strokeRect(50, boardSize - 60, boardSize - 100, 20);
            ctx.beginPath(); ctx.arc(50, boardSize - 50, 10, 0, Math.PI * 2); ctx.fillStyle = "#ff3333"; ctx.fill();
            ctx.beginPath(); ctx.arc(boardSize - 50, boardSize - 50, 10, 0, Math.PI * 2); ctx.fill();
            ctx.strokeRect(50, 40, boardSize - 100, 20);
            ctx.beginPath(); ctx.arc(50, 50, 10, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(boardSize - 50, 50, 10, 0, Math.PI * 2); ctx.fill();
        }

        function checkCollisions() {
            for (let i = 0; i < pieces.length; i++) {
                for (let j = i + 1; j < pieces.length; j++) {
                    let p1 = pieces[i], p2 = pieces[j];
                    if (!p1.active || !p2.active) continue;
                    let dx = p2.x - p1.x, dy = p2.y - p1.y, distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < p1.radius + p2.radius) {
                        let overlap = (p1.radius + p2.radius) - distance, nx = dx / distance, ny = dy / distance;
                        p1.x -= nx * overlap / 2; p2.x += nx * overlap / 2;
                        let velAlongNormal = (p1.vx - p2.vx) * nx + (p1.vy - p2.vy) * ny;
                        if (velAlongNormal > 0) continue;
                        if (Math.abs(velAlongNormal) > 0.5) playSound('hit');
                        let j_impulse = -(1 + restitution) * velAlongNormal / (1/p1.mass + 1/p2.mass);
                        p1.vx -= (j_impulse * nx) / p1.mass; p1.vy -= (j_impulse * ny) / p1.mass;
                        p2.vx += (j_impulse * nx) / p2.mass; p2.vy += (j_impulse * ny) / p2.mass;
                    }
                }
            }
        }

        function isBoardStill() { return pieces.every(p => Math.abs(p.vx) === 0 && Math.abs(p.vy) === 0); }
        function switchTurn() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            turnIndicator.innerText = currentPlayer === 1 ? "⚪ Player 1 (Bottom)" : "⚫ Player 2 (Top)";
            turnIndicator.style.backgroundColor = currentPlayer === 1 ? "#f2e3c6" : "#222222";
            turnIndicator.style.color = currentPlayer === 1 ? "#111" : "#fff";
            slider.value = 170; 
        }
        function resetStriker() {
            striker.x = parseInt(slider.value); striker.y = (currentPlayer === 1) ? (boardSize - 50) : 50; 
            striker.vx = 0; striker.vy = 0; striker.active = true;
        }
        function checkWin() {
            if (scoreWhite >= maxScore) { winnerText.innerText = "⚪ Player 1 Wins! 🎉"; gameOverScreen.classList.remove("hidden"); gameIsOver = true; } 
            else if (scoreBlack >= maxScore) { winnerText.innerText = "⚫ Player 2 Wins! 🎉"; gameOverScreen.classList.remove("hidden"); gameIsOver = true; }
        }

        slider.addEventListener("input", function() {
            if (striker.active && isBoardStill() && !gameIsOver) { striker.x = parseInt(this.value); striker.y = (currentPlayer === 1) ? (boardSize - 50) : 50; }
        });

        function gameLoop() {
            if (gameIsOver) return; 
            ctx.clearRect(0, 0, canvas.width, canvas.height); drawBoard();
            if (isDragging && striker.active) {
                ctx.shadowColor = "transparent"; ctx.beginPath(); ctx.moveTo(striker.x, striker.y);
                ctx.lineTo(striker.x + (striker.x - dragStartX) * 2, striker.y + (striker.y - dragStartY) * 2);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)"; ctx.lineWidth = 4; ctx.setLineDash([8, 8]); ctx.stroke(); ctx.setLineDash([]); 
            }
            pieces.forEach(p => p.update()); checkCollisions(); pieces.forEach(p => p.draw());

            if (shotTaken && isBoardStill()) {
                if (!pocketedThisTurn || isStrikerFoul) switchTurn();
                pocketedThisTurn = false; isStrikerFoul = false; shotTaken = false; resetStriker(); 
            }
            requestAnimationFrame(gameLoop);
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };
        }

        function startDrag(e) {
            if (!striker.active || !isBoardStill() || gameIsOver) return;
            e.preventDefault(); if (audioCtx.state === 'suspended') audioCtx.resume();
            const pos = getMousePos(e);
            if (Math.sqrt((pos.x - striker.x)**2 + (pos.y - striker.y)**2) <= striker.radius * 2) { isDragging = true; dragStartX = pos.x; dragStartY = pos.y; }
        }
        function drag(e) { if (!isDragging) return; e.preventDefault(); const pos = getMousePos(e); dragStartX = pos.x; dragStartY = pos.y; }
        function endDrag(e) {
            if (!isDragging) return; isDragging = false;
            let pullX = striker.x - dragStartX, pullY = striker.y - dragStartY;
            let power = Math.min(Math.sqrt(pullX*pullX + pullY*pullY), 100), angle = Math.atan2(pullY, pullX);
            striker.vx = Math.cos(angle) * power * 0.2; striker.vy = Math.sin(angle) * power * 0.2; shotTaken = true;
        }

        canvas.addEventListener("mousedown", startDrag); canvas.addEventListener("touchstart", startDrag, {passive: false});
        canvas.addEventListener("mousemove", drag); canvas.addEventListener("touchmove", drag, {passive: false});
        canvas.addEventListener("mouseup", endDrag); canvas.addEventListener("touchend", endDrag);

        gameLoop();
    </script>
</body>
</html>
