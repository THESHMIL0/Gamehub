<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Phone Gaming Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-frame">
        
        <div class="notch"></div>
        <div class="status-bar">
            <span>10:35</span> <span>📶 🔋</span> </div>

        <div id="lock-screen" class="screen">
            <h1 id="lock-time">10:35</h1>
            <h2>Enter Pin</h2>
            <input type="password" id="password-input" placeholder="****" maxlength="4">
            <button onclick="checkPassword()">Unlock</button>
            <p id="error-message" class="hidden">Wrong pin! 😸</p>
        </div>

        <div id="home-screen" class="screen hidden">
            <div class="app-grid">
                <a href="games/carrom.html" class="app-icon" style="background-color: #ff5722;">Carrom</a>
                <a href="games/snake.html" class="app-icon" style="background-color: #4caf50;">Snake</a>
                <a href="games/ludo.html" class="app-icon" style="background-color: #2196f3;">Ludo</a>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
